#tmux configuration
set-option -g status-position top
set-option -g status-justify centre
set -g mouse on
set-option -g status-left-length 50
set-option -g status-right-length 50

# rose pine dawn — love (#b4637a) for session, subtle (#797593) for inactive windows
# separator uses highlight high (#cecacd) to divide status bar from terminal content
set-option -g status-style "bg=#f2e9e1"

# session name on the left
set-option -g status-left '#[fg=#b4637a,bold] #S '

# window count on the right — #I is current index, #{session_windows} is total
set-option -g status-right ' #[fg=#797593]#I/#{session_windows} '

# window tabs — subtle for inactive, love+bold for active
set-option -g window-status-format         '#[fg=#797593] #I #W '
set-option -g window-status-current-format '#[fg=#b4637a,bold] #I #W '

# separator line between status bar and terminal panes
set-option -g pane-border-style        "fg=#dfdad9"
set-option -g pane-active-border-style "fg=#b4637a"

set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on
